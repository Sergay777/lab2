<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Электронный журнал{% endblock %}</title>
    {% load static %}
    <link href="{% static 'journal/css/styles.css' %}" rel="stylesheet">
</head>
<body>
    <!-- Общее меню сайта -->
    <nav>
        <ul>
            <li><a href="{% url 'home' %}">Главная</a></li>
            <!-- ... другие ссылки ... -->
              {% if user.is_staff %}
                <li><a href="{% url 'attendance_add' %}">Отметить посещаемость</a></li>

              {% endif %}

        </ul>
    </nav>

    <!-- Блок приветствия для залогиненных пользователей -->
    <div class="user-greeting">
        {% if user.is_authenticated %}
            <p>Добро пожаловать, <strong>{{ user.username }}</strong>!</p>
        {% else %}
            <p>Вы не авторизованы. <a href="{% url 'login' %}">Войдите</a> в систему.</p>
        {% endif %}
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
